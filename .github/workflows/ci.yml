name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.5'
  COVERAGE_MIN: '75'

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, json, redis
          coverage: none

      - uses: ramsey/composer-install@v3

      - run: composer validate --strict

      - run: composer audit --locked --abandoned=ignore

  lint:
    name: Lint - ${{ matrix.tool.name }}
    runs-on: ubuntu-latest
    needs: [security]
    strategy:
      fail-fast: false
      matrix:
        tool:
          - name: Pint
            command: lint:pint
          - name: PHPCS
            command: lint:phpcs
          - name: PHPStan
            command: lint:phpstan
          - name: PHPMD
            command: lint:phpmd
          - name: AI Instructions
            command: instructions:verify
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, json, redis
          coverage: none

      - uses: ramsey/composer-install@v3

      - run: composer ${{ matrix.tool.command }}

  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, json, redis
          coverage: pcov

      - uses: ramsey/composer-install@v3

      - run: composer ci

      - name: Check coverage threshold
        run: |
          COVERAGE=$(php -r "
            \$xml = simplexml_load_file('coverage.xml');
            \$metrics = \$xml->project->metrics;
            \$statements = (int)\$metrics['statements'];
            \$covered = (int)\$metrics['coveredstatements'];
            \$percent = \$statements > 0 ? round((\$covered / \$statements) * 100, 2) : 0;
            echo \$percent;
          ")
          echo "Code coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < ${{ env.COVERAGE_MIN }}" | bc -l) )); then
            echo "::error::Code coverage ${COVERAGE}% is below minimum threshold of ${{ env.COVERAGE_MIN }}%"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
